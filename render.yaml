services:
  - type: web
    name: web-chatgpt-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: node server/proxy.mjs
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_URL
        value: https://luongchidung.online/v1/responses
      - key: OPENAI_API_KEY
        sync: false
